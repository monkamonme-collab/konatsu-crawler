name: Daily Konatsu Alert

on:
  schedule:
    # 改成 07:55 台灣時間（UTC 23:55），通常比整點更準時
    - cron: '55 23 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # 將 v3 改為 v4，將 v4 改為 v5，可消除警告
      - name: 複製代碼
        uses: actions/checkout@v4

      - name: 設定 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: 安裝套件
        run: pip install feedparser requests beautifulsoup4

      - name: 執行爬蟲
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python crawl.py
